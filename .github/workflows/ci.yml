name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Verify install script (fresh-clone equivalent)
        run: |
          # Use a throwaway skills dir so we don't touch the runner's real one
          TMP_SKILLS="$(mktemp -d)"
          bash bin/install.sh --force --no-test --skills-dir "$TMP_SKILLS"
          # Confirm both symlinks were created and point inside the repo
          test -L "$TMP_SKILLS/oh-my-wiki"
          test -L "$TMP_SKILLS/omw"
          [ "$(readlink "$TMP_SKILLS/oh-my-wiki")" = "$GITHUB_WORKSPACE" ]
          [ "$(readlink "$TMP_SKILLS/omw")" = "$GITHUB_WORKSPACE/omw" ]
          # Confirm uninstaller cleans up
          bash bin/uninstall.sh --skills-dir "$TMP_SKILLS" --quiet
          test ! -L "$TMP_SKILLS/oh-my-wiki"
          test ! -L "$TMP_SKILLS/omw"
          echo "✅ install + uninstall scripts verified"
