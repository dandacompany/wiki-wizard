name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tmux
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y tmux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew list tmux >/dev/null 2>&1 || brew install tmux
          fi
        shell: bash

      - name: Verify tmux version
        run: tmux -V

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Verify install script (fresh-clone equivalent)
        run: |
          # Use a throwaway skills dir so we don't touch the runner's real one
          TMP_SKILLS="$(mktemp -d)"
          bash bin/install.sh --force --no-test --skills-dir "$TMP_SKILLS"
          # Confirm both symlinks were created and point inside the repo
          test -L "$TMP_SKILLS/oh-my-wiki"
          test -L "$TMP_SKILLS/omw"
          [ "$(readlink "$TMP_SKILLS/oh-my-wiki")" = "$GITHUB_WORKSPACE" ]
          [ "$(readlink "$TMP_SKILLS/omw")" = "$GITHUB_WORKSPACE/omw" ]
          # Confirm uninstaller cleans up
          bash bin/uninstall.sh --skills-dir "$TMP_SKILLS" --quiet
          test ! -L "$TMP_SKILLS/oh-my-wiki"
          test ! -L "$TMP_SKILLS/omw"
          echo "✅ install + uninstall scripts verified"

      - name: Smoke — CLI entrypoints, manifests, exec bits
        run: |
          # CLI modules respond to --help with exit 0
          python -m scripts.wizard --help > /dev/null
          python -m scripts.swarm --help > /dev/null
          python -m scripts.personas --help > /dev/null
          # personas list emits a non-empty JSON array (structural, no hardcoded count)
          python - <<'PY'
          import json, subprocess, sys
          out = subprocess.check_output([sys.executable, "-m", "scripts.personas", "list"], text=True)
          data = json.loads(out)
          assert isinstance(data, list) and len(data) >= 16, "expected >=16 personas (9 base + 6 SP1 + orchestrator)"
          print(f"personas: {len(data)} entries")
          PY
          # both plugin manifests are valid JSON
          python -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          # install/uninstall scripts keep their executable bit
          test -x bin/install.sh
          test -x bin/uninstall.sh
          # user-facing omw CLI entrypoint
          omw --help > /dev/null
          omw status > /dev/null
          omw search --help > /dev/null
          omw serve --help > /dev/null
          omw import --help > /dev/null
          omw schema list > /dev/null
          omw supersede --help > /dev/null
          test -x bin/omw-install.sh
          echo "✅ smoke checks passed"
        shell: bash
